openapi: 3.0.3
servers:
  - description: Cluster endpoint
    url: /api
info:
  title: Ambulance Management API
  version: "1.0.0"
  description: API contract for ambulance management modules including fleet and dispatch management.
  contact:
    email: your_email@stuba.sk
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/
tags:
  - name: Vehicle Management
    description: Ambulance vehicle management API.
  - name: Dispatch Management
    description: Ambulance dispatch management API.
paths:
  /vehicles:
    get:
      tags:
        - Vehicle Management
      summary: List ambulance vehicles
      description: Returns the registered ambulance vehicles with optional filtering by operational status and station.
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/VehicleStatus'
          description: Filter vehicles by current operational status.
        - in: query
          name: station
          schema:
            type: string
          description: Filter vehicles by assigned station.
      responses:
        '200':
          description: Vehicle list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
    post:
      tags:
        - Vehicle Management
      summary: Register a new ambulance vehicle
      description: Adds a new ambulance vehicle to the fleet registry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleCreateRequest'
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Invalid vehicle payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Vehicle with the same call sign or plate number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /vehicles/{vehicleId}:
    parameters:
      - in: path
        name: vehicleId
        required: true
        description: Internal vehicle identifier.
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Vehicle Management
      summary: Get ambulance vehicle detail
      description: Returns technical and operational detail of a specific ambulance vehicle.
      responses:
        '200':
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Vehicle Management
      summary: Update ambulance vehicle
      description: Updates editable ambulance vehicle data including technical information and current status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleUpdateRequest'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Invalid vehicle payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Vehicle Management
      summary: Remove ambulance vehicle from registry
      description: Retires an ambulance vehicle that is no longer in service.
      responses:
        '204':
          description: Vehicle removed
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /vehicles/{vehicleId}/status:
    parameters:
      - in: path
        name: vehicleId
        required: true
        description: Internal vehicle identifier.
        schema:
          type: integer
          format: int64
    patch:
      tags:
        - Vehicle Management
      summary: Update ambulance vehicle status
      description: Changes only the operational status of the ambulance vehicle.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleStatusUpdateRequest'
      responses:
        '200':
          description: Vehicle status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Invalid status update payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dispatches:
    get:
      tags:
        - Dispatch Management
      summary: List ambulance dispatches
      description: Returns current and historical ambulance dispatches with optional filtering by status and city.
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DispatchStatus'
          description: Filter dispatches by current workflow status.
        - in: query
          name: city
          schema:
            type: string
          description: Filter dispatches by city of the incident.
      responses:
        '200':
          description: Dispatch list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dispatch'
    post:
      tags:
        - Dispatch Management
      summary: Create ambulance dispatch
      description: Creates a new ambulance dispatch request for a patient incident.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchCreateRequest'
      responses:
        '201':
          description: Dispatch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispatch'
        '400':
          description: Invalid dispatch payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Dispatch with the same incident number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dispatches/{dispatchId}:
    parameters:
      - in: path
        name: dispatchId
        required: true
        description: Internal dispatch identifier.
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Dispatch Management
      summary: Get ambulance dispatch detail
      description: Returns detail of a specific ambulance dispatch.
      responses:
        '200':
          description: Dispatch detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispatch'
        '404':
          description: Dispatch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Dispatch Management
      summary: Update ambulance dispatch
      description: Updates the editable dispatch data for an existing ambulance mission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchUpdateRequest'
      responses:
        '200':
          description: Dispatch updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispatch'
        '400':
          description: Invalid dispatch payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Dispatch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Dispatch Management
      summary: Cancel ambulance dispatch
      description: Cancels a dispatch that was created by mistake or is no longer needed.
      responses:
        '204':
          description: Dispatch cancelled
        '404':
          description: Dispatch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dispatches/{dispatchId}/status:
    parameters:
      - in: path
        name: dispatchId
        required: true
        description: Internal dispatch identifier.
        schema:
          type: integer
          format: int64
    patch:
      tags:
        - Dispatch Management
      summary: Update ambulance dispatch status
      description: Updates only the operational status of a dispatch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchStatusUpdateRequest'
      responses:
        '200':
          description: Dispatch status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispatch'
        '400':
          description: Invalid dispatch status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Dispatch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    VehicleStatus:
      type: string
      description: Supported vehicle lifecycle and availability states.
      enum:
        - AVAILABLE
        - ON_MISSION
        - OUT_OF_SERVICE
        - IN_SERVICE
    Vehicle:
      type: object
      required:
        - id
        - callSign
        - vehicleType
        - plateNumber
        - station
        - assignedCrew
        - status
        - mileageKm
        - lastServiceDate
        - notes
      properties:
        id:
          type: integer
          format: int64
          example: 315
        callSign:
          type: string
          maxLength: 30
          example: AMB-315
        vehicleType:
          type: string
          maxLength: 100
          example: Type C ambulance
        plateNumber:
          type: string
          maxLength: 20
          example: TT-194LM
        station:
          type: string
          maxLength: 100
          example: Trnava North
        assignedCrew:
          type: string
          maxLength: 100
          example: Kovac / Balaz
        status:
          $ref: '#/components/schemas/VehicleStatus'
        mileageKm:
          type: integer
          format: int32
          minimum: 0
          example: 72110
        lastServiceDate:
          type: string
          format: date
          example: 2026-01-28
        notes:
          type: string
          maxLength: 1000
          example: Assigned to inter-hospital transfer rotation.
    VehicleCreateRequest:
      type: object
      required:
        - callSign
        - vehicleType
        - plateNumber
        - station
        - status
        - mileageKm
        - lastServiceDate
      properties:
        callSign:
          type: string
          maxLength: 30
          example: AMB-402
        vehicleType:
          type: string
          maxLength: 100
          example: Type B ambulance
        plateNumber:
          type: string
          maxLength: 20
          example: BA-875XY
        station:
          type: string
          maxLength: 100
          example: Bratislava Center
        assignedCrew:
          type: string
          maxLength: 100
          example: Novak / Simko
          default: Unassigned
        status:
          $ref: '#/components/schemas/VehicleStatus'
        mileageKm:
          type: integer
          format: int32
          minimum: 0
          example: 12500
        lastServiceDate:
          type: string
          format: date
          example: 2026-04-01
        notes:
          type: string
          maxLength: 1000
          example: New backup vehicle for central district.
    VehicleUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/VehicleCreateRequest'
    VehicleStatusUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/VehicleStatus'
    DispatchStatus:
      type: string
      description: Supported ambulance dispatch workflow states.
      enum:
        - ACCEPTED
        - EN_ROUTE
        - ON_SCENE
        - TRANSPORTING_TO_HOSPITAL
        - COMPLETED
    DispatchPriority:
      type: string
      description: Triage priority assigned to the dispatch.
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
    Dispatch:
      type: object
      required:
        - id
        - incidentNumber
        - callerName
        - patientName
        - streetAddress
        - city
        - dispatchReason
        - priority
        - status
        - ambulanceCallSign
        - destinationHospital
        - dispatcherName
        - createdAt
        - updatedAt
        - notes
      properties:
        id:
          type: integer
          format: int64
          example: 8105
        incidentNumber:
          type: string
          maxLength: 40
          example: DIS-2026-0042
        callerName:
          type: string
          maxLength: 120
          example: Jana Moravcikova
        patientName:
          type: string
          maxLength: 120
          example: Peter Novy
        streetAddress:
          type: string
          maxLength: 200
          example: Hlavna 19
        city:
          type: string
          maxLength: 120
          example: Trnava
        dispatchReason:
          type: string
          maxLength: 500
          example: Chest pain and shortness of breath.
        priority:
          $ref: '#/components/schemas/DispatchPriority'
        status:
          $ref: '#/components/schemas/DispatchStatus'
        ambulanceCallSign:
          type: string
          maxLength: 40
          example: AMB-204
        destinationHospital:
          type: string
          maxLength: 150
          example: Fakultna nemocnica Trnava
        dispatcherName:
          type: string
          maxLength: 120
          example: Martina Horvathova
        createdAt:
          type: string
          format: date-time
          example: '2026-04-20T08:15:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-04-20T08:32:00Z'
        notes:
          type: string
          maxLength: 1000
          example: Patient is conscious, second floor apartment, elevator available.
    DispatchCreateRequest:
      type: object
      required:
        - incidentNumber
        - callerName
        - patientName
        - streetAddress
        - city
        - dispatchReason
        - priority
        - status
        - ambulanceCallSign
        - destinationHospital
        - dispatcherName
        - createdAt
      properties:
        incidentNumber:
          type: string
          maxLength: 40
          example: DIS-2026-0060
        callerName:
          type: string
          maxLength: 120
          example: Tomas Varga
        patientName:
          type: string
          maxLength: 120
          example: Eva Vargova
        streetAddress:
          type: string
          maxLength: 200
          example: Bernolakova 8
        city:
          type: string
          maxLength: 120
          example: Nitra
        dispatchReason:
          type: string
          maxLength: 500
          example: Fall with possible head injury.
        priority:
          $ref: '#/components/schemas/DispatchPriority'
        status:
          $ref: '#/components/schemas/DispatchStatus'
        ambulanceCallSign:
          type: string
          maxLength: 40
          example: AMB-118
        destinationHospital:
          type: string
          maxLength: 150
          example: Fakultna nemocnica Nitra
        dispatcherName:
          type: string
          maxLength: 120
          example: Lucia Kmetova
        createdAt:
          type: string
          format: date-time
          example: '2026-04-20T09:05:00Z'
        notes:
          type: string
          maxLength: 1000
          example: Caller reports significant bleeding from scalp.
    DispatchUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/DispatchCreateRequest'
    DispatchStatusUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/DispatchStatus'
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Vehicle not found.
